<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Found</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>The requested file could not be found.</p>
  </main>
</body>
</html>
